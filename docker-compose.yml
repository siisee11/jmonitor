services:
  postgresdb:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jmonitor}
      POSTGRES_USER: ${POSTGRES_USER:-jmonitor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jmonitor}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-jmonitor}:${POSTGRES_PASSWORD:-jmonitor}@postgresdb:5432/${POSTGRES_DB:-jmonitor}?sslmode=disable
      CODEX_HOME: /codex
      HTTP_ADDR: :8080
      POLL_INTERVAL: ${POLL_INTERVAL:-5m}
    volumes:
      - ${CODEX_HOME_HOST:-${HOME}/.codex}:/codex:ro
    depends_on:
      postgresdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/healthz >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5

  webserver:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    environment:
      APP_HOSTNAME: ${APP_HOSTNAME:-_}
    ports:
      - "${WEB_PORT:-4748}:80"
    volumes:
      - ./deploy/nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 5

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    profiles:
      - tunnel
    depends_on:
      webserver:
        condition: service_healthy
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN} --url http://webserver:80

volumes:
  postgres_data:
